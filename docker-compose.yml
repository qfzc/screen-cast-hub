services:
  # ============== Backend Service ==============

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: screencast-backend
    restart: unless-stopped
    environment:
      # Database
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-screencast123}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-screencast-jwt-secret-key-must-be-at-least-256-bits-long-2024-production}
      # MinIO
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-screencast}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-screencast123456}
      MINIO_BUCKET: ${MINIO_BUCKET:-screencast}
      # MQTT
      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_EMBEDDED_ENABLED: ${MQTT_EMBEDDED_ENABLED:-true}
      MQTT_PORT: 1883
      MQTT_HOST: 0.0.0.0
      # Gotenberg
      GOTENBERG_URL: ${GOTENBERG_URL:-http://gotenberg:3000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - screencast-network

