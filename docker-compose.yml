#  # ============== Optional Services ==============

  # MinIO Object Storage (optional - can use external S3)
  minio:
    image: minio/minio:latest
    container_name: screencast-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-screencast}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-screencast123456}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - screencast-network
    profiles:
      - minio

  # Gotenberg - PPT to PDF conversion service
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: screencast-gotenberg
    restart: unless-stopped
    environment:
      - CHROMIUM_DISABLE_ROUTES=false
    ports:
      - "${GOTENBERG_PORT:-3000}:3000"
    networks:
      - screencast-network
    profiles:
      - gotenberg

volumes:
  minio_data:
    driver: local
  backend_logs:
    driver: local

networks:
  screencast-network:
    driver: bridge
